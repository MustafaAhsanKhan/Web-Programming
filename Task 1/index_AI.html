<!DOCTYPE html>
<html lang="en">
<head>
    <!--Metadata for an art gallery home page-->

    <!-- Character Encoding -->
    <meta charset="UTF-8">
    
    <!-- Viewport for Responsive Design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO Title -->
    <title>Mustafa Arts - Contemporary Art Gallery | Original Artwork & Exhibitions</title>
    
    <!-- Meta Description -->
    <meta name="description" content="Discover stunning contemporary art at Mustafa Arts gallery. Explore our curated collection of original paintings, photography, and modern artwork from emerging and established artists.">
    
    <!-- Meta Keywords -->
    <meta name="keywords" content="art gallery, contemporary art, modern art, paintings, photography, original artwork, art exhibitions, fine art, visual arts, Mustafa Arts">
    
    <!-- Author -->
    <meta name="author" content="Mustafa Arts">
    
    <!-- Robots Meta Tag -->
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph Meta Tags (Facebook, LinkedIn) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Mustafa Arts - Contemporary Art Gallery">
    <meta property="og:description" content="Discover stunning contemporary art at Mustafa Arts gallery. Explore our curated collection of original paintings, photography, and modern artwork.">
    <meta property="og:url" content="https://mustafaarts.com">
    <meta property="og:site_name" content="Mustafa Arts">
    <meta property="og:image" content="https://mustafaarts.com/art/pexels-abel-kayode-155872537-10850706.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Mustafa Arts - Contemporary Art Gallery">
    <meta name="twitter:description" content="Discover stunning contemporary art at Mustafa Arts gallery. Explore our curated collection of original paintings, photography, and modern artwork.">
    <meta name="twitter:image" content="https://mustafaarts.com/art/pexels-abel-kayode-155872537-10850706.jpg">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://mustafaarts.com">
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#ffffff">
    
</head>
<body style="text-align: center;">
    <!-- Navigation Bar -->
    <nav style="background-color: #333; padding: 10px;">
        <a href="index.html" style="color: white; text-decoration: none; margin: 0 15px;">Home</a>
        <a href="about.html" style="color: white; text-decoration: none; margin: 0 15px;">About Us</a>
        <a href="feedback.html" style="color: white; text-decoration: none; margin: 0 15px;">Feedback</a>
    </nav>

    <h1>Mustafa Arts</h1>
    <!-- Images in 3-column grid layout -->
    <div style="display: grid; grid-template-columns: repeat(3, 300px); gap: 10px; justify-content: center; margin: 20px auto;">
        <img src="art/pexels-abel-kayode-155872537-10850706.jpg" alt="Image 1" width="300" height="300" style="border: 3px solid black; border-radius: 8px;">
        <img src="art/pexels-alexeydemidov-11623274.jpg" alt="Image 2" width="300" height="300" style="border: 3px solid black; border-radius: 8px;">
        <img src="art/pexels-beil-4116392.jpg" alt="Image 3" width="300" height="300" style="border: 3px solid black; border-radius: 8px;">
        <img src="art/pexels-daniel-maforte-3709229-5544036.jpg" alt="Image 4" width="300" height="300" style="border: 3px solid black; border-radius: 8px;">
        <img src="art/pexels-emrah-ozsahin-98491936-9320059.jpg" alt="Image 5" width="300" height="300" style="border: 3px solid black; border-radius: 8px;">
        <img src="art/pexels-murvl-5990744.jpg" alt="Image 6" width="300" height="300" style="border: 3px solid black; border-radius: 8px;">
    </div>

    <div style="max-width: 500px; margin: 50px auto;">
        <form style="text-align: left;">
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name" style="width: 100%; padding: 8px; margin: 5px 0 15px 0;" required><br>
            
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" style="width: 100%; padding: 8px; margin: 5px 0 15px 0;" required><br>
            
            <label for="message">Your Feedback:</label><br>
            <textarea id="message" name="message" rows="5" style="width: 100%; padding: 8px; margin: 5px 0 15px 0;" required></textarea><br>
            
            <label for="rating">Rating:</label><br>
            <select id="rating" name="rating" style="width: 100%; padding: 8px; margin: 5px 0 15px 0;">
                <option value="5">Excellent</option>
                <option value="4">Good</option>
                <option value="3">Average</option>
                <option value="2">Poor</option>
                <option value="1">Very Poor</option>
            </select><br>
            
            <input type="submit" value="Submit" style="background-color: #333; color: white; padding: 10px 20px; border: none; cursor: pointer;">
        </form>
    </div>

    <h1>About Us</h1>
    <div style="max-width: 600px; margin: 50px auto; text-align: left;">
        <h2>Welcome to Mustafa Arts</h2>
        <p>We are a contemporary art gallery dedicated to showcasing stunning artwork from emerging and established artists.</p>
    </div>
</body>
</html>
