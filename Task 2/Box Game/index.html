<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click the Square Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

        <div class="score-board">

        <div id="game-area">
            <div id="square"></div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
